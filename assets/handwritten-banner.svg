<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Handwritten profile banner</title>
  <desc id="desc">某司算法工程师，关注搜广推、因果推断、大模型Agent等领域。</desc>
  <defs>
    <filter id="paperNoise">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" seed="19" result="noise" />
      <feColorMatrix in="noise" type="saturate" values="0" result="mono" />
      <feComponentTransfer in="mono">
        <feFuncA type="table" tableValues="0 0.06" />
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="multiply" />
    </filter>
    <filter id="pencil" x="-8%" y="-20%" width="116%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="1.25" numOctaves="2" seed="8" result="rough" />
      <feDisplacementMap in="SourceGraphic" in2="rough" scale="0.85" />
    </filter>
    <style>
      .paper { fill: #fbf7ef; }
      .ink { fill: #6d1823; }
      .pencil { fill: none; stroke: #3d3935; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; opacity: 0.82; }
      .thin { stroke-width: 1.25; opacity: 0.7; }
      .text {
        font-family: "Kaiti SC", "STKaiti", "KaiTi", "Songti SC", serif;
        font-size: 31px;
        font-weight: 400;
        letter-spacing: 4px;
      }
      .small {
        font-family: "Kaiti SC", "STKaiti", "KaiTi", "Songti SC", serif;
        font-size: 16px;
        letter-spacing: 1px;
      }
    </style>
  </defs>

  <rect class="paper" x="0" y="0" width="1200" height="360" filter="url(#paperNoise)" />

  <g class="ink text" filter="url(#pencil)">
    <text x="600" y="124" text-anchor="middle" transform="rotate(-1.3 600 124)">某司算法工程师</text>
    <text x="600" y="176" text-anchor="middle" transform="rotate(0.8 600 176)">关注 搜广推 · 因果推断</text>
    <text x="600" y="228" text-anchor="middle" transform="rotate(-0.6 600 228)">大模型 Agent 等领域</text>
  </g>

  <g class="ink" filter="url(#pencil)" transform="translate(594 255) rotate(-4)">
    <path d="M0 0 C8 -12 24 -8 25 7 C26 24 4 30 0 43 C-5 30 -27 24 -25 7 C-24 -8 -8 -12 0 0 Z" fill="none" stroke="#6d1823" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <g filter="url(#pencil)" transform="translate(888 218)">
    <path class="pencil" d="M48 0 L62 34 L99 32 L70 55 L80 91 L49 70 L17 92 L27 56 L0 33 L36 34 Z" />
    <path class="pencil thin" d="M34 49 Q42 56 51 49" />
    <path class="pencil thin" d="M34 39 Q39 35 43 39" />
    <path class="pencil thin" d="M56 39 Q61 35 65 39" />
    <path class="pencil" d="M34 91 L31 132" />
    <path class="pencil" d="M62 91 L67 132" />
    <path class="pencil" d="M22 132 L39 132" />
    <path class="pencil" d="M58 132 L76 132" />
    <path class="pencil thin" d="M5 66 L-17 76" />
    <path class="pencil thin" d="M93 64 L116 74" />
    <path class="pencil thin" d="M58 -12 L64 -22" />
    <path class="pencil thin" d="M73 -3 L84 -11" />
  </g>

  <g filter="url(#pencil)" transform="translate(1026 228) rotate(6)">
    <path class="pencil" d="M44 0 L57 30 L90 29 L64 50 L73 82 L45 64 L17 83 L25 51 L0 30 L33 30 Z" />
    <path class="pencil thin" d="M31 45 Q43 56 57 45" />
    <path class="pencil thin" d="M31 34 Q36 31 40 35" />
    <path class="pencil thin" d="M55 35 Q60 31 64 34" />
    <path class="pencil" d="M31 82 L27 126" />
    <path class="pencil" d="M60 82 L64 126" />
    <path class="pencil" d="M18 126 L36 126" />
    <path class="pencil" d="M55 126 L73 126" />
    <path class="pencil thin" d="M10 61 L-12 69" />
    <path class="pencil thin" d="M82 61 L105 67" />
    <text class="small" x="-2" y="143" fill="#3d3935">keep building</text>
  </g>
</svg>
