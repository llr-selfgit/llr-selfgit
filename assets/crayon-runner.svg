<svg xmlns="http://www.w3.org/2000/svg" width="900" height="150" viewBox="0 0 900 150" role="img" aria-labelledby="title desc">
  <title id="title">Crayon-style runner animation</title>
  <desc id="desc">An original crayon-style cartoon kid bouncing from left to right along a horizontal line.</desc>
  <defs>
    <filter id="crayon" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="7" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.1" />
    </filter>
  </defs>

  <line x1="24" y1="124" x2="876" y2="124" stroke="#2f2a26" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 12" opacity="0.55" />

  <g>
    <animateTransform attributeName="transform" type="translate" values="-80 0; 880 0" dur="7.5s" repeatCount="indefinite" />

    <ellipse cx="32" cy="128" rx="28" ry="6" fill="#2f2a26" opacity="0.16">
      <animate attributeName="rx" values="22;31;22" dur="0.55s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.10;0.20;0.10" dur="0.55s" repeatCount="indefinite" />
    </ellipse>

    <g filter="url(#crayon)">
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -22; 0 0" dur="0.55s" repeatCount="indefinite" />

      <path d="M28 76 L18 101 L31 104 L39 80 Z" fill="#f7c948" stroke="#2f2a26" stroke-width="3" stroke-linejoin="round" />
      <path d="M43 76 L54 101 L41 104 L35 80 Z" fill="#f7c948" stroke="#2f2a26" stroke-width="3" stroke-linejoin="round" />

      <path d="M18 58 Q36 43 56 58 L52 84 Q35 92 20 83 Z" fill="#ef4444" stroke="#2f2a26" stroke-width="3" stroke-linejoin="round" />
      <path d="M19 62 L5 74" stroke="#2f2a26" stroke-width="5" stroke-linecap="round" />
      <path d="M53 61 L68 49" stroke="#2f2a26" stroke-width="5" stroke-linecap="round" />

      <circle cx="36" cy="35" r="25" fill="#ffd8a8" stroke="#2f2a26" stroke-width="3" />
      <path d="M12 30 Q22 5 39 12 Q52 8 62 30 Q46 18 33 20 Q22 19 12 30 Z" fill="#201816" stroke="#2f2a26" stroke-width="3" stroke-linejoin="round" />
      <path d="M20 34 Q27 30 32 34" stroke="#2f2a26" stroke-width="3" stroke-linecap="round" fill="none" />
      <path d="M43 34 Q50 30 55 34" stroke="#2f2a26" stroke-width="3" stroke-linecap="round" fill="none" />
      <circle cx="28" cy="42" r="2.6" fill="#2f2a26" />
      <circle cx="47" cy="42" r="2.6" fill="#2f2a26" />
      <path d="M31 51 Q38 56 47 51" stroke="#2f2a26" stroke-width="3" stroke-linecap="round" fill="none" />
      <circle cx="18" cy="45" r="4" fill="#ff9f80" opacity="0.7" />
      <circle cx="55" cy="45" r="4" fill="#ff9f80" opacity="0.7" />

      <path d="M25 104 L14 124" stroke="#2f2a26" stroke-width="6" stroke-linecap="round" />
      <path d="M47 104 L61 122" stroke="#2f2a26" stroke-width="6" stroke-linecap="round" />
      <path d="M8 124 H24" stroke="#ef4444" stroke-width="5" stroke-linecap="round" />
      <path d="M55 124 H71" stroke="#ef4444" stroke-width="5" stroke-linecap="round" />
    </g>
  </g>
</svg>
