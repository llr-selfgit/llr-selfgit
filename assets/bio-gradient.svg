<svg xmlns="http://www.w3.org/2000/svg" width="900" height="38" viewBox="0 0 900 38" role="img" aria-labelledby="title desc">
  <title id="title">Colorful profile bio</title>
  <desc id="desc">某司算法工程师，关注搜广推、因果推断、大模型Agent等领域。</desc>
  <defs>
    <linearGradient id="bioGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="24%" stop-color="#7c3aed" />
      <stop offset="48%" stop-color="#db2777" />
      <stop offset="72%" stop-color="#0891b2" />
      <stop offset="100%" stop-color="#65a30d" />
    </linearGradient>
    <clipPath id="typingReveal">
      <rect x="160" y="0" width="56" height="38">
        <animate attributeName="width" values="56;580;580;56" keyTimes="0;0.62;0.86;1" dur="7.2s" repeatCount="indefinite" />
      </rect>
    </clipPath>
  </defs>
  <g clip-path="url(#typingReveal)">
    <text x="450" y="25" text-anchor="middle" font-family="'PingFang SC', 'Hiragino Sans GB', 'Noto Sans SC', 'Microsoft YaHei', sans-serif" font-size="13.5" font-weight="400" letter-spacing="0" fill="url(#bioGradient)">
      某司算法工程师，关注搜广推、因果推断、大模型 Agent 等领域。
    </text>
  </g>
  <rect x="216" y="10" width="1.4" height="18" rx="0.7" fill="#0891b2">
    <animate attributeName="x" values="216;740;740;216" keyTimes="0;0.62;0.86;1" dur="7.2s" repeatCount="indefinite" />
  </rect>
</svg>
