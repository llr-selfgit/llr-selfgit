<svg xmlns="http://www.w3.org/2000/svg" width="900" height="56" viewBox="0 0 900 56" role="img" aria-labelledby="title desc">
  <title id="title">Gradient typing bio</title>
  <desc id="desc">某司算法工程师，关注搜广推、因果推断、大模型Agent等领域。</desc>
  <defs>
    <linearGradient id="techGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="28%" stop-color="#a78bfa" />
      <stop offset="55%" stop-color="#f472b6" />
      <stop offset="78%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#a3e635" />
      <animateTransform attributeName="gradientTransform" type="translate" values="-0.35 0;0.35 0;-0.35 0" dur="5s" repeatCount="indefinite" />
    </linearGradient>
    <filter id="softGlow" x="-10%" y="-80%" width="120%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <clipPath id="typingClip">
      <rect x="0" y="0" width="0" height="56">
        <animate attributeName="width" values="0;820;820;0" keyTimes="0;0.58;0.82;1" dur="7s" repeatCount="indefinite" />
      </rect>
    </clipPath>
  </defs>

  <rect x="109" y="43" width="682" height="1" fill="url(#techGradient)" opacity="0.55" />
  <g clip-path="url(#typingClip)">
    <text x="450" y="34" text-anchor="middle" font-family="'SF Pro Text', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="600" letter-spacing="0" fill="url(#techGradient)" filter="url(#softGlow)">
      某司算法工程师，关注搜广推、因果推断、大模型Agent等领域。
    </text>
  </g>
  <rect x="109" y="17" width="2.5" height="21" rx="1.25" fill="#22d3ee">
    <animate attributeName="x" values="109;792;792;109" keyTimes="0;0.58;0.82;1" dur="7s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="1;0;1" dur="0.9s" repeatCount="indefinite" />
  </rect>
</svg>
